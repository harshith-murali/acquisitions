version: '3.8'

services:
  neon-local:
    image: neondatabase/neon_local:latest
    container_name: acquisitions-neon-local
    hostname: neon-local

    ports:
      - '5432:5432'

    networks:
      - acquisitions-dev

    env_file:
      - .env.development

    environment:
      POSTGRES_USER: neon
      POSTGRES_PASSWORD: npg
      POSTGRES_DB: neondb

    volumes:
      - neon-local-data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neon']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development

    container_name: acquisitions-app-dev

    depends_on:
      neon-local:
        condition: service_healthy

    networks:
      - acquisitions-dev

    env_file:
      - .env.development

    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://neon:npg@neon-local:5432/neondb

    ports:
      - '3000:3000'

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

    stdin_open: true
    tty: true

networks:
  acquisitions-dev:
    driver: bridge

volumes:
  neon-local-data:
