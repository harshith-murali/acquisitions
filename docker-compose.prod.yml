version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    image: acquisitions-api:latest
    container_name: acquisitions-app-prod

    restart: unless-stopped

    networks:
      - acquisitions-prod

    env_file:
      - .env.production

    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: warn
      DATABASE_URL: ${DATABASE_URL}

    ports:
      - '3000:3000'

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --spider -q http://localhost:3000/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    volumes:
      - ./logs:/app/logs

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  acquisitions-prod:
    driver: bridge